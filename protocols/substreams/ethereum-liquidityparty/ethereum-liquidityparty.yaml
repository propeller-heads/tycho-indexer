specVersion: v0.1.0
package:
  name: "ethereum_liquidityparty"
  version: v0.1.2
  url: "https://github.com/propeller-heads/tycho-protocol-sdk/tree/main/substreams/ethereum-liquidityparty"

protobuf:
  files:
    - tycho/evm/v1/common.proto
    - tycho/evm/v1/utils.proto
  importPaths:
    - ../../../proto

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/ethereum_liquidityparty.wasm

network: mainnet
networks:
  mainnet:
    params:
      map_protocol_components: planner=0xe6C22aA3e1B3e11AA6C1C6E3086883b3C5071071&info=0x5f1B901f2955CAD0B28978eF6f0D3054C102F244&mint_impl=0xDF2535B88D97Bf52649D87D41986e4C5B7aB60f5&extra_impl=0x5f34B189ca58EeC3B6c1Ac432f3D5F85058ACbf7
      map_protocol_changes: planner=0xe6C22aA3e1B3e11AA6C1C6E3086883b3C5071071&info=0x5f1B901f2955CAD0B28978eF6f0D3054C102F244&mint_impl=0xDF2535B88D97Bf52649D87D41986e4C5B7aB60f5&extra_impl=0x5f34B189ca58EeC3B6c1Ac432f3D5F85058ACbf7

modules:
  - name: map_protocol_components
    kind: map
    initialBlock: 25088849
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:tycho.evm.v1.BlockTransactionProtocolComponents

  - name: store_protocol_components
    kind: store
    initialBlock: 25088849
    updatePolicy: set
    valueType: string
    inputs:
      - map: map_protocol_components

  - name: map_killed_components
    kind: map
    initialBlock: 25088849
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_protocol_components
    output:
      type: proto:tycho.evm.v1.BlockTransactionProtocolComponents

  - name: store_killed_components
    kind: store
    initialBlock: 25088849
    updatePolicy: set
    valueType: int64
    inputs:
      - map: map_killed_components

  - name: map_relative_component_balance
    kind: map
    initialBlock: 25088849
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_protocol_components
      - store: store_killed_components
    output:
      type: proto:tycho.evm.v1.BlockBalanceDeltas

  - name: store_balances
    kind: store
    initialBlock: 25088849
    updatePolicy: add
    valueType: bigint
    inputs:
      - map: map_relative_component_balance

  - name: map_protocol_changes
    kind: map
    initialBlock: 25088849
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
      - map: map_protocol_components
      - map: map_killed_components
      - map: map_relative_component_balance
      - store: store_protocol_components
      - store: store_balances
        mode: deltas
    output:
      type: proto:tycho.evm.v1.BlockChanges
