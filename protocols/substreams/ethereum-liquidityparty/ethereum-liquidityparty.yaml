specVersion: v0.1.0
package:
  name: "ethereum_liquidityparty"
  version: v0.1.2
  url: "https://github.com/propeller-heads/tycho-protocol-sdk/tree/main/substreams/ethereum-liquidityparty"

protobuf:
  files:
    - tycho/evm/v1/common.proto
    - tycho/evm/v1/utils.proto
  importPaths:
    - ../../../proto

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/ethereum_liquidityparty.wasm

network: mainnet
networks:
  mainnet:
    params:
      map_protocol_components: planner=0xdDda7Fa3AC71197309FEf368E366183f9d0365E8&info=0x6191527e6F4ca976b31bA4a984Ff96B1ED6AaB97&mint_impl=0x04c6108A5b6a3a193F7548F22809900337b6fe56&extra_impl=0x9072Eb97454b33b311CF50d3cc42dc6E627a48Bc
      map_protocol_changes: planner=0xdDda7Fa3AC71197309FEf368E366183f9d0365E8&info=0x6191527e6F4ca976b31bA4a984Ff96B1ED6AaB97&mint_impl=0x04c6108A5b6a3a193F7548F22809900337b6fe56&extra_impl=0x9072Eb97454b33b311CF50d3cc42dc6E627a48Bc

modules:
  - name: map_protocol_components
    kind: map
    initialBlock: 25067440
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:tycho.evm.v1.BlockTransactionProtocolComponents

  - name: store_protocol_components
    kind: store
    initialBlock: 25067440
    updatePolicy: set
    valueType: string
    inputs:
      - map: map_protocol_components

  - name: map_killed_components
    kind: map
    initialBlock: 25067440
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_protocol_components
    output:
      type: proto:tycho.evm.v1.BlockTransactionProtocolComponents

  - name: store_killed_components
    kind: store
    initialBlock: 25067440
    updatePolicy: set
    valueType: int64
    inputs:
      - map: map_killed_components

  - name: map_relative_component_balance
    kind: map
    initialBlock: 25067440
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_protocol_components
      - store: store_killed_components
    output:
      type: proto:tycho.evm.v1.BlockBalanceDeltas

  - name: store_balances
    kind: store
    initialBlock: 25067440
    updatePolicy: add
    valueType: bigint
    inputs:
      - map: map_relative_component_balance

  - name: map_protocol_changes
    kind: map
    initialBlock: 25067440
    inputs:
      - params: string
      - source: sf.ethereum.type.v2.Block
      - map: map_protocol_components
      - map: map_killed_components
      - map: map_relative_component_balance
      - store: store_protocol_components
      - store: store_balances
        mode: deltas
    output:
      type: proto:tycho.evm.v1.BlockChanges
