author:
  name: Tim Olson
  email: tim@dexorder.com

constants:
  # This is our median gas cost for a 10-asset pool. Gas varies by pool size from 120k to 200k.
  protocol_gas: 139307
  capabilities:
    - SellSide
    - PriceFunction
    - MarginalPrice

contract: LiquidityPartySwapAdapter.sol

# Deployment instances used to generate chain specific bytecode.
instances:
  - chain:
      name: mainnet
      id: 1
    arguments:
      - "0xdDda7Fa3AC71197309FEf368E366183f9d0365E8"  # PartyPlanner
      - "0x6191527e6F4ca976b31bA4a984Ff96B1ED6AaB97"  # PartyInfo
