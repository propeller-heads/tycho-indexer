author:
  name: Tim Olson
  email: tim@dexorder.com

constants:
  # This is our median gas cost for a 10-asset pool. Gas varies by pool size from 120k to 200k.
  protocol_gas: 139307
  capabilities:
    - SellSide
    - PriceFunction
    - MarginalPrice

contract: LiquidityPartySwapAdapter.sol

# Deployment instances used to generate chain specific bytecode.
instances:
  - chain:
      name: mainnet
      id: 1
    arguments:
      - "0xe6C22aA3e1B3e11AA6C1C6E3086883b3C5071071"  # PartyPlanner
      - "0x5f1B901f2955CAD0B28978eF6f0D3054C102F244"  # PartyInfo
