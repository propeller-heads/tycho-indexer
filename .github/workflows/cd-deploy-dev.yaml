name: Dev; Build and deploy

# Build a branch image and deploy it to dev. Use this to test changes on a
# feature branch before they land on main.
#
# For tycho-indexer, the app_name input controls which ECS service is updated.
# Choosing "tycho-indexer" deploys to all indexer services; picking a specific
# name (e.g. "base-tycho-indexer") targets only that one.
#
# For tycho-integration-test the app_name input is ignored.
on:
  workflow_dispatch:
    inputs:
      application:
        description: Application to build and deploy
        required: true
        type: choice
        options:
          - tycho-indexer
          - tycho-integration-test
      app_name:
        description: >
          ECS service to deploy (tycho-indexer only).
          "tycho-indexer" deploys all indexer services.
        required: false
        type: choice
        default: tycho-indexer
        options:
          - tycho-indexer
          - arbitrum-tycho-indexer
          - ethereum-tycho-indexer
          - ethereum-tycho-indexer-new-protocol
          - base-tycho-indexer
          - unichain-tycho-indexer

permissions:
  id-token: write
  contents: read

jobs:
  # ── tycho-indexer ──────────────────────────────────────────────────────────
  build-and-push-tycho-indexer:
    if: inputs.application == 'tycho-indexer'
    uses: propeller-heads/ci-cd-templates/.github/workflows/build-and-push-docker-image.yaml@main
    permissions:
      id-token: write
      contents: read
    with:
      image_tag: ${{ github.sha }}
      image_name: tycho-indexer
      dockerfile: docker/tycho-indexer.Dockerfile
    secrets:
      app_id: ${{ secrets.APP_ID }}
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
      role_to_assume: ${{ secrets.ROLE_TO_ASSUME }}
      aws_region: ${{ secrets.AWS_REGION }}
      repository_url: ${{ secrets.REPOSITORY_URL }}
      domain_owner: ${{ secrets.DOMAIN_OWNER }}

  deploy-dev-tycho-indexer:
    needs: build-and-push-tycho-indexer
    if: inputs.application == 'tycho-indexer'
    uses: propeller-heads/ci-cd-templates/.github/workflows/deploy-any-branch-dev.yaml@main
    permissions:
      id-token: write
      contents: read
    with:
      image_name: tycho-indexer
      image_tag: ${{ github.sha }}
      app_name: ${{ inputs.app_name }}
    secrets:
      app_id: ${{ secrets.APP_ID }}
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
      role_to_assume: ${{ secrets.ROLE_TO_ASSUME }}
      aws_region: ${{ secrets.AWS_REGION }}
      eks_cluster_name: ${{ secrets.EKS_CLUSTER_NAME }}

  # ── tycho-integration-test ─────────────────────────────────────────────────
  build-and-push-tycho-integration-test:
    if: inputs.application == 'tycho-integration-test'
    uses: propeller-heads/ci-cd-templates/.github/workflows/build-and-push-docker-image.yaml@main
    permissions:
      id-token: write
      contents: read
    with:
      image_tag: ${{ github.sha }}
      image_name: tycho-integration-test
      dockerfile: docker/tycho-integration-test.Dockerfile
    secrets:
      app_id: ${{ secrets.APP_ID }}
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
      role_to_assume: ${{ secrets.ROLE_TO_ASSUME }}
      aws_region: ${{ secrets.AWS_REGION }}
      repository_url: ${{ secrets.REPOSITORY_URL }}
      domain_owner: ${{ secrets.DOMAIN_OWNER }}

  deploy-dev-tycho-integration-test:
    needs: build-and-push-tycho-integration-test
    if: inputs.application == 'tycho-integration-test'
    uses: propeller-heads/ci-cd-templates/.github/workflows/deploy-any-branch-dev.yaml@main
    permissions:
      id-token: write
      contents: read
    with:
      image_name: tycho-integration-test
      image_tag: ${{ github.sha }}
      app_name: tycho-integration-test
    secrets:
      app_id: ${{ secrets.APP_ID }}
      app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
      role_to_assume: ${{ secrets.ROLE_TO_ASSUME }}
      aws_region: ${{ secrets.AWS_REGION }}
      eks_cluster_name: ${{ secrets.EKS_CLUSTER_NAME }}
